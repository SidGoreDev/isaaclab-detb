name: DETB v1 CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  mock_v1:
    name: mock-backed v1 baseline
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e .[dev]
      - name: Run pytest
        run: python -m pytest -q
      - name: Mock train smoke
        run: python -m detb.cli train --set execution.backend=mock --set execution.output_root="${{ runner.temp }}/detb-outputs"
