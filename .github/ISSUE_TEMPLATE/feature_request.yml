name: Feature request
description: Propose a DETB capability or workflow improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What engineering workflow or analysis gap does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the capability, artifacts, and commands you expect.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Impact on evidence contract
      description: Note any effect on manifests, metrics, reports, or requirements.
  - type: textarea
    id: tests
    attributes:
      label: Expected validation
      description: What tests or acceptance checks should exist?
